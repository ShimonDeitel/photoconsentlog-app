name: Photoconsentlog
options:
  bundleIdPrefix: com.shimondeitel.photoconsentlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Photoconsentlog:
    type: application
    platform: iOS
    sources:
      - path: Photoconsentlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.photoconsentlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Photoconsentlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PhotoconsentlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PhotoconsentlogTests
      - path: Photoconsentlog.storekit
    dependencies:
      - target: Photoconsentlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.photoconsentlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PhotoconsentlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PhotoconsentlogUITests
    dependencies:
      - target: Photoconsentlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.photoconsentlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Photoconsentlog:
    build:
      targets:
        Photoconsentlog: all
        PhotoconsentlogTests: [test]
        PhotoconsentlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Photoconsentlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Photoconsentlog.storekit
      targets:
        - PhotoconsentlogTests
        - PhotoconsentlogUITests
    archive:
      config: Release
